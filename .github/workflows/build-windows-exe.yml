name: Build Python Windows EXE

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - 'v*'
    paths:
      - 'python/**'
      - 'assets/**'
      - '.github/workflows/build-windows-exe.yml'
  pull_request:
    paths:
      - 'python/**'
      - 'assets/**'
      - '.github/workflows/build-windows-exe.yml'

permissions:
  contents: write

jobs:
  build-python-windows:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: python

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
          python -m pip install -r requirements-build.txt

      - name: Run unit tests
        shell: pwsh
        run: python -m pytest tests/ -v --tb=short

      - name: Build Windows executable
        shell: pwsh
        run: pyinstaller --noconfirm --clean square_ar_game.spec

      - name: Create release archive
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $archiveName = if ($tag) { "square-ar-game-python-$tag-windows.zip" } else { "square-ar-game-python-windows.zip" }
          Compress-Archive -Path dist/SquareARGame/* -DestinationPath "dist/$archiveName" -Force

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: square-ar-game-python-windows
          path: |
            python/dist/SquareARGame/**
            python/dist/*.zip
          if-no-files-found: error

      - name: Publish GitHub release asset
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: python/dist/*.zip
